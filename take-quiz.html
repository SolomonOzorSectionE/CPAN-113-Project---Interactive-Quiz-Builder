<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Quiz - QuizBuilder</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <h2>QuizBuilder</h2>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="create-quiz.html">Create Quiz</a></li>
                <li><a href="all-quizzes.html">All Quizzes</a></li>
                <li><a href="take-quiz.html">Take Quiz</a></li>
                <li><a href="answer-bank.html">Answer Bank</a></li>
                <li><a href="results.html">Quiz Results</a></li>
            </ul>
        </div>
    </nav>

    <main class="page-container">
        <section class="form-section">
            <h1>Take a Quiz</h1>
            <p class="page-description">Select a quiz and answer its questions.</p>

            <div class="take-quiz-controls">
                <label for="quizSelect">Choose a Quiz</label>
                <select id="quizSelect">
                    <option value="">Select a quiz</option>
                </select>
                <button type="button" id="loadQuizBtn" class="primary-btn">Load Quiz</button>
            </div>

            <form id="takeQuizForm" class="quiz-form">
                <div id="quizQuestions"></div>
                <button type="submit" id="submitQuizBtn" class="secondary-btn">Submit Quiz</button>
            </form>

            <p id="takeQuizMessage" class="message"></p>
        </section>
    </main>

    <script src="./take-quiz.js"></script>
</body>
</html>
