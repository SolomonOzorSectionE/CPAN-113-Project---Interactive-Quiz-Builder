<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Quiz - QuizBuilder</title>
    <link rel="stylesheet" href="../Styling/styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">QuizBuilder</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="create-quiz.html" class="active">Create Quiz</a></li>
            <li><a href="all-quizzes.html">All Quizzes</a></li>
            <li><a href="answer-bank.html">Answer Bank</a></li>
            <li><a href="results.html">Quiz Results</a></li>
        </ul>
    </nav>

    <main class="page-container">
        <section class="form-section">
            <h1>Create a Quiz</h1>
            <p class="page-description">
                Add quiz questions, possible answers, and choose the correct answer.
            </p>

            <form id="quizForm" class="quiz-form">
                <label for="quizTitle">Quiz Title</label>
                <input type="text" id="quizTitle" placeholder="Enter quiz title" required>

                <label for="questionText">Question</label>
                <textarea id="questionText" placeholder="Enter your question here" required></textarea>

                <label for="option1">Option 1</label>
                <input type="text" id="option1" placeholder="Enter option 1" required>

                <label for="option2">Option 2</label>
                <input type="text" id="option2" placeholder="Enter option 2" required>

                <label for="option3">Option 3</label>
                <input type="text" id="option3" placeholder="Enter option 3" required>

                <label for="option4">Option 4</label>
                <input type="text" id="option4" placeholder="Enter option 4" required>

                <label for="correctAnswer">Correct Answer</label>
                <select id="correctAnswer" required>
                    <option value="">Select the correct answer</option>
                    <option value="0">Option 1</option>
                    <option value="1">Option 2</option>
                    <option value="2">Option 3</option>
                    <option value="3">Option 4</option>
                </select>

                <div class="button-group">
                    <button type="submit" class="primary-btn">Save Question</button>
                    <button type="button" id="clearBtn" class="secondary-btn">Clear Form</button>
                </div>
            </form>

            <p id="message" class="message"></p>
        </section>
    </main>

    <script src="../JavaScript/create-quiz.js"></script>
</body>
</html>
